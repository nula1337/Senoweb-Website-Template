# Replace the "backend" object below with the snippet from DecapBridge. We need something here to get the CMS to work locally, but this alone won't work in production
backend:
  name: git-gateway
  branch: main

# Keep this to allow you to edit the cms locally
local_backend: true

# Change url to a link to the image you want to use, no file paths, must be a URL
logo:
  src: "https://www.senoweb.cz/assets/images/senoweb_og_logo_rounded.png"
  show_in_header: false

locale: "cs"

# Where should uploaded files be saved
media_folder: "src/assets/images/cms"

# Where should media be served, relative to the base of the built site
public_folder: "/assets/cms"

# Slug function configuration
slug:
  encoding: "ascii"
  clean_accents: true
  sanitize_replacement: "-"

collections:
  # BLOG CONFIG
  - label: "Blog"
    name: "blog"
    folder: "src/content/cms/blog"
    create: true
    slug: "{{year}}-{{month}}-{{day}}_{{slug}}"
    summary: "{{ title }} [{{ date | date('DD. MM. YYYY') }}]"
    editor:
      preview: true

    fields:
      - { label: "Název", name: "title", widget: "string" }
      - {
          label: "URL odkaz",
          name: "url",
          widget: "string",
          hint: "Určete, kam bude stránka zapsána. Pokud použijete „blogovy-prispevek“, bude příspěvek přístupný na adrese „/blog/blogovy-prispevek“. URL odkaz musí být jedinečný.",
          pattern:
            [
              "^[a-zà-ž0-9]+(?:-[a-zà-ž0-9]+)*$",
              "Pouze písmena (A-Z, a-z), číslice a pomlčky (-). Žádná lomítka ani speciální znaky.",
            ],
        }
      - {
          label: "Popis",
          name: "description",
          widget: "string",
          hint: "Kratší popis blogového příspěvku, který se zobrazuje na náhledech příspěvků",
        }
      - { label: "Autor", name: "author", widget: "string" }
      - { label: "Datum", name: "date", widget: "datetime" }

      - label: "Náhledový obrázek"
        name: "image"
        widget: "object"
        summary: "Obrázek - {{fields.alt}}"
        fields:
          - { label: "Obrázek", name: "url", widget: "image" }
          - {
              label: "Popis obrázku",
              name: "alt",
              widget: "string",
              hint: "Popište, co je na obrázku. Slouží k validnímu SEO tohoto příspěvku.",
            }

      - { label: "Obsah", name: "body", widget: "markdown" }
      - { label: "Štítky", name: "tags", widget: "hidden", default: ["blog"] }
